services:
  postgres:
    image: postgres:16
    container_name: cafe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafedb
    ports:
      - "5432:5432"
    volumes:
      - cafe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafedb"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  cafe_pg_data:
